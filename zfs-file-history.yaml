diff:
  mode: external

fileBrowser:
  # Permissions Column.
  # Can be one of
  #   - octal    (e.g. "0755")
  #   - symbolic (e.g. "rwxr-xr-x")
  permissions: octal
  # UID/GID Column.
  # Can be one of
  #   - name (e.g. "root")
  #   - id   (e.g. "0") or
  #   - both (e.g. "0(root)")
  owner: id

profiling:
  # Whether to enable the profiling webserver
  enabled: false
  # The host to listen for connections
  host: localhost
  # The port to listen for connections
  port: 6060
