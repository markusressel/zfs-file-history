name: Go

on:
  push:
    branches: [ main ]
    tags:
      - '*.*.*' # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches: [ main ]

jobs:
  generate:
    name: Generate cross-platform builds
    runs-on: ubuntu-latest
    permissions:
      contents: write

    container:
      image: ixsystems/zfs:latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set safe directory for git
        run: |
          git config --system --add safe.directory '*'
          git config --global --add safe.directory '*'
          git config --global --add safe.directory '/__w/zfs-file-history/zfs-file-history'

      - uses: actions/setup-go@v6
        with:
          go-version: '^1.23'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        if: false
        env:
          GOFLAGS: "-buildvcs=false"
        with:
          # Optional: version of golangci-lint to use in form of v1.2 or v1.2.3 or `latest` to use the latest version
          version: latest

          # Optional: working directory, useful for monorepos
          # working-directory: somedir

          # Optional: golangci-lint command line arguments.
          # args: --exclude-use-default
          # --issues-exit-code=0

          # Optional: show only new issues if it's a pull request. The default value is `false`.
          # only-new-issues: true

          # Optional: if set to true then the all caching functionality will be complete disabled,
          #           takes precedence over all other caching options.
          skip-cache: true

          # Optional: if set to true then the action don't cache or restore ~/.cache/go-build.
          # skip-build-cache: true

      - uses: extractions/setup-just@v2

      - name: Test
        run: just test

      - name: Build
        run: just build

      - name: Generate build files (linux/amd64)
        run: |
          GOOS="linux" GOARCH="amd64" just GO_FLAGS="-buildmode=exe" OUTPUT_BIN="dist/zfs-file-history-linux-amd64" build

      - name: Generate build files (linux/arm64)
        run: |
          GOOS="linux" GOARCH="arm64" just GO_FLAGS="-buildmode=exe" OUTPUT_BIN="dist/zfs-file-history-linux-arm64" build

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/zfs-file-history-linux-amd64
            dist/zfs-file-history-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
